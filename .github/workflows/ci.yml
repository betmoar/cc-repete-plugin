# CI gate for cc-repete. The hook is the loop engine users trust their Stop
# button to — nothing merges with a red suite. Mirrors tests/run-all.sh.
name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq shellcheck
      - name: shellcheck
        run: shellcheck hooks/*.sh statusline/*.sh tests/*.sh
      - name: plugin manifests are valid JSON
        run: jq -e . .claude-plugin/plugin.json .claude-plugin/statusline.json hooks/hooks.json > /dev/null
      - name: hook engine tests
        run: bash tests/test-hooks.sh
      - name: statusline tests
        run: bash tests/test-statusline.sh
